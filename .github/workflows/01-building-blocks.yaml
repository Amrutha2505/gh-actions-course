name: 01 - Building blocks

on: push

jobs:
  echo-hello:
    runs-on: ubuntu-latest
    steps:
      - name: Say Hello
        run: echo "Hello, world!"
  echo-goodbye:
    runs-on: ubuntu-latest
    steps:
      - name: Failed step
        run: | 
          echo "This step will fail"
          exit 1
      - name: Say Goodbye
        run: echo "Goodbye, world!"
